name: Summarise workout data

on:
  push:
    branches:
      - main
    paths:
      - data/workout-data.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: workout-summary
  cancel-in-progress: false

jobs:
  summarise:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workout summary
        run: npm run summarise:workouts

      - name: Commit workout summary
        run: |
          if git diff --quiet -- data/codex-land-training-summary.json; then
            echo "No workout summary changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/codex-land-training-summary.json
          git commit -m "Update land training summary"
          git push
